name: Publish to PyPI

on:
  push:
    tags:
      - "v*" # triggers on v0.1.1, v0.2.0, etc.

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install ".[sqlite]" pytest pytest-cov httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short

  publish:
    needs: test # only publish if all tests pass
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify wheel contents
        run: |
          echo "── Wheel contents ──"
          unzip -l dist/*.whl | grep "\.py$"
          echo ""
          echo "Must show sulci/*.py  NOT  sulci_lib/sulci/*.py"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/* --verbose
